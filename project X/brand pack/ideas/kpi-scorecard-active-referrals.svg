  <title id="title">Active referrals KPI scorecard</title><desc id="desc">Illustrative active referrals scorecard with previous-month comparison.</desc>
  <rect width="560" height="260" fill="#FFFFFF" stroke="#D6D6D4"/><rect width="10" height="260" fill="#F59E00"/>
