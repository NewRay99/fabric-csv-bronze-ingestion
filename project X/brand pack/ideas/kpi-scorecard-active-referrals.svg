  <line x1="38" y1="164" x2="522" y2="164" stroke="#D6D6D4"/><text x="38" y="194" font-size="13" fill="#575756">Previous month</text><text x="38" y="224" font-size="22" font-weight="700" fill="#1D1D1B">1,198</text>
